<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Matches Lucide Radar icon: center dot + 3 concentric circle arcs -->
  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="#3B82F6"/>
  
  <!-- Inner ring (full circle, subtle) -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#3B82F6" stroke-width="8" stroke-opacity="0.85"/>
  
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="125" fill="none" stroke="#3B82F6" stroke-width="8" stroke-opacity="0.55"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#3B82F6" stroke-width="8" stroke-opacity="0.3"/>
  
  <!-- Radar line sweeping to top-right -->
  <line x1="256" y1="256" x2="384" y2="128" stroke="#3B82F6" stroke-width="8" stroke-linecap="round" stroke-opacity="0.7"/>
  
  <!-- Signal blip on the line -->
  <circle cx="345" cy="167" r="10" fill="#60A5FA" fill-opacity="0.9"/>
</svg>
