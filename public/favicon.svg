<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Outer radar arc (top-right quadrant sweep) -->
  <path d="M 256,256 m 0,-170 a 170,170 0 0,1 170,170" 
        fill="none" stroke="url(#blue)" stroke-width="28" stroke-linecap="round" stroke-opacity="0.35"/>
  
  <!-- Middle radar arc -->
  <path d="M 256,256 m 0,-120 a 120,120 0 0,1 120,120" 
        fill="none" stroke="url(#blue)" stroke-width="28" stroke-linecap="round" stroke-opacity="0.6"/>
  
  <!-- Inner radar arc -->
  <path d="M 256,256 m 0,-70 a 70,70 0 0,1 70,70" 
        fill="none" stroke="url(#blue)" stroke-width="28" stroke-linecap="round" stroke-opacity="0.85"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="22" fill="#3B82F6"/>
  <circle cx="256" cy="256" r="32" fill="#3B82F6" fill-opacity="0.25"/>

  <!-- Signal dot on outer arc -->
  <circle cx="370" cy="148" r="14" fill="#60A5FA" fill-opacity="0.7"/>
</svg>
